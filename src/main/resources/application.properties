# ================================
# Spotline API Configuration
# ================================

spring.application.name=spotline-api
server.port=4000
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ================================
# PostgreSQL (Supabase)
# ================================
spring.datasource.url=${env.SUPABASE_DB_URL:${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/spotline}}
spring.datasource.username=${env.SUPABASE_DB_USER:${SUPABASE_DB_USER:postgres}}
spring.datasource.password=${env.SUPABASE_DB_PASSWORD:${SUPABASE_DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================================
# Supabase Auth
# ================================
supabase.url=${env.SUPABASE_URL:${SUPABASE_URL:}}
supabase.anon-key=${env.SUPABASE_ANON_KEY:${SUPABASE_ANON_KEY:}}
supabase.jwt-secret=${env.SUPABASE_JWT_SECRET:${SUPABASE_JWT_SECRET:}}

# ================================
# Place API Keys
# ================================
place.naver.client-id=${env.NAVER_CLIENT_ID:${NAVER_CLIENT_ID:}}
place.naver.client-secret=${env.NAVER_CLIENT_SECRET:${NAVER_CLIENT_SECRET:}}
place.kakao.rest-api-key=${env.KAKAO_REST_API_KEY:${KAKAO_REST_API_KEY:}}

# Place API Cache TTL (hours)
place.cache.ttl-hours=24
place.cache.max-size=2000

# ================================
# AWS S3 (existing)
# ================================
aws.s3.bucket=${env.AWS_S3_BUCKET:${AWS_S3_BUCKET:}}
aws.s3.region=${env.AWS_REGION:${AWS_REGION:ap-northeast-2}}
aws.s3.access-key=${env.AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
aws.s3.secret-key=${env.AWS_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}

# ================================
# CORS
# ================================
cors.allowed-origins=${env.CORS_ORIGINS:${CORS_ORIGINS:http://localhost:3000,http://localhost:3003,http://localhost:3004,http://localhost:5173}}

# ================================
# Actuator
# ================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ================================
# Logging
# ================================
logging.level.com.spotline=DEBUG
logging.level.org.hibernate.SQL=WARN
