# Dev profile — Supabase PostgreSQL (same as production)
# DB connection uses .env values via application.properties defaults

# JPA / Hibernate — update mode (preserves data across restarts)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Supabase Auth for dev
supabase.jwt-secret=dev-secret-key-for-local-testing-only-min-32-chars!!

# AWS S3 — .env values
aws.s3.bucket=${AWS_S3_BUCKET:lhj-spotline-assets-2026}
aws.s3.region=${AWS_REGION:ap-northeast-2}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
